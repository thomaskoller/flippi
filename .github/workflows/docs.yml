name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - claude/flipper-zero-learning-portal-dZd5i
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build site
        run: uv run --frozen zensical build --clean
      - uses: actions/configure-pages@v5
        with:
          # Create/enable the Pages site automatically so no manual settings click is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
